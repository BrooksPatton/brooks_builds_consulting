name: Deploy Beta

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-beta
  cancel-in-progress: false

jobs:
  beta:
    # Skips (green run) until the beta stack exists: deploy it, then set the
    # three BETA_* repo Actions variables and this starts running on its own.
    # All three are checked so a half-finished setup skips instead of failing.
    if: vars.BETA_AWS_DEPLOY_ROLE_ARN != '' && vars.BETA_S3_BUCKET != '' && vars.BETA_CF_DISTRIBUTION_ID != ''
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      role-arn: ${{ vars.BETA_AWS_DEPLOY_ROLE_ARN }}
      bucket: ${{ vars.BETA_S3_BUCKET }}
      distribution-id: ${{ vars.BETA_CF_DISTRIBUTION_ID }}
