name: Infrastructure

# Pulumi lifecycle for infra/ — the pattern is inspect-then-apply:
#   PRs:      `pulumi preview` on BOTH stacks (read-only plan, visible on the PR)
#   main:     `pulumi up` on beta automatically
#   manual:   `pulumi up` on prod via Run workflow (mirrors the site's Release split)
# Do not add an `environment:` key to any job — it changes the OIDC sub claim's shape
# and breaks the pulumi CI role's trust policy (which matches refs/heads/main and
# pull_request claims exactly).
on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Offline checks — no AWS, no Pulumi backend. Runs on every PR and push; skipped only for
  # workflow_dispatch (up-prod deploys main HEAD, which already passed these on its PR and
  # again on the merge push).
  check:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
        working-directory: infra
      - run: npm run typecheck
        working-directory: infra
      - name: Redirect-function behavior matrix
        run: npm test
        working-directory: infra

  # Skips (green run) until Brooks' identity bootstrap sets the PULUMI_CI_ROLE_ARN
  # variable — same convention as the site deploys. Set the PULUMI_ACCESS_TOKEN secret
  # BEFORE the variable: secrets can't be checked in a job-level if, so a set variable
  # with a missing secret fails red instead of skipping. The head-repo check skips fork
  # PRs green (forks get no OIDC token, so the AWS step could only fail).
  preview:
    if: github.event_name == 'pull_request' && vars.PULUMI_CI_ROLE_ARN != '' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Required for OIDC: without id-token permission, configure-aws-credentials fails with
    # a misleading "credentials could not be loaded" error.
    permissions:
      id-token: write
      contents: read
    strategy:
      # Always show both stacks' plans on a PR, even when one fails.
      fail-fast: false
      matrix:
        stack: [beta, prod]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
        working-directory: infra
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.PULUMI_CI_ROLE_ARN }}
          aws-region: us-east-1
      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: ${{ matrix.stack }}
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  up-beta:
    if: github.event_name == 'push' && vars.PULUMI_CI_ROLE_ARN != ''
    runs-on: ubuntu-latest
    needs: check
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: pulumi-up-beta
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
        working-directory: infra
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.PULUMI_CI_ROLE_ARN }}
          aws-region: us-east-1
      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: beta
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # Prod applies only on demand: Actions tab -> Infrastructure -> Run workflow (on main).
  # The prod stack's plan is already visible on every PR via the preview matrix. Ordering
  # note for first launch: this fails loudly (CNAMEAlreadyExists / Route53 conflicts) if
  # the old platform app hasn't been retired yet — that's the deliberate cutover guard.
  up-prod:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && vars.PULUMI_CI_ROLE_ARN != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: pulumi-up-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
        working-directory: infra
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.PULUMI_CI_ROLE_ARN }}
          aws-region: us-east-1
      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: prod
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
